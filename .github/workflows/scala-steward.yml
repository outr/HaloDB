name: Scala Steward

# Scala Steward opens PRs to update sbt itself, sbt plugins, and library
# dependencies declared in build.sbt / project/*.sbt.
on:
  schedule:
    - cron: '0 6 * * 1' # every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  scala-steward:
    runs-on: ubuntu-latest
    steps:
      - name: Run Scala Steward
        uses: scala-steward-org/scala-steward-action@v2
        with:
          # Uses the org-level ADMIN_GITHUB_TOKEN (a PAT) so Steward's PRs trigger
          # the CI workflow; PRs opened with the default GITHUB_TOKEN would not.
          # Falls back to GITHUB_TOKEN if the org secret isn't available to this repo.
          github-token: ${{ secrets.ADMIN_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
